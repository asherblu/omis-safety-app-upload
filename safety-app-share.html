function Badge({ type, value }) {
  const m = type==="severity" ? SEVERITY : STATUS;
  const i = m[value] || {};
  return <span style={{background:i.bg,color:i.color,padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700,border:`1px solid ${i.color}30`}}>{i.label}</span>;
}
function Inp({ value, onChange, onKeyDown, placeholder, type="text", style={} }) {
  return <input type={type} value={value} onChange={onChange} onKeyDown={onKeyDown} placeholder={placeholder}
    style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid #E0E0E0",fontSize:14,direction:"rtl",boxSizing:"border-box",...style}}/>;
}
function Btn({ onClick, children, color="#FF6B35", disabled=false, outline=false, style={} }) {
  return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"12px",borderRadius:12,fontWeight:700,fontSize:15,cursor:disabled?"not-allowed":"pointer",background:outline?"transparent":disabled?"#ccc":color,color:outline?color:"#fff",border:outline?`2px solid ${color}`:"none",opacity:disabled?0.6:1,...style}}>{children}</button>;
}

function LoginScreen({ onLogin, logo, companyName, depts }) {
  const [screen, setScreen] = useState("main");
  const [phone, setPhone]   = useState("");
  const [loginPass, setLP]  = useState("");
  const [loginErr, setLE]   = useState(false);
  const [rName, setRN]      = useState("");
  const [rPhone, setRP]     = useState("");
  const [rPass, setRPa]     = useState("");
  const [rPass2, setRPa2]   = useState("");
  const [rDept, setRD]      = useState(depts[0]||"");
  const [rErr, setRE]       = useState("");
  const [mPass, setMP]      = useState("");
  const [mErr, setME]       = useState(false);
  const [done, setDone]     = useState(false);
  const [busy, setBusy]     = useState(false);

  const goLogin = () => {
    if(phone.replace(/-/g,"").length<9)return;
    setLP("");setLE(false);setScreen("pass");
  };
  const goRegister = () => {
    if(phone.replace(/-/g,"").length<9)return;
    setRP(phone);setRD(depts[0]||"");setRE("");setScreen("reg");
  };
  const login = async () => {
    setBusy(true);
    try{
      const cred = await auth.signInWithEmailAndPassword(phoneToEmail(phone), loginPass);
      const doc = await db.collection("users").doc(cred.user.uid).get();
      const u = { id:cred.user.uid, ...doc.data() };
      if(u.status==="pending"){ await auth.signOut(); setScreen("pend"); setBusy(false); return; }
      if(u.status==="rejected"){ await auth.signOut(); alert("הרישום שלך נדחה. פנה למנהל."); setBusy(false); return; }
      onLogin(u);
    }catch(e){ setLE(true); }
    setBusy(false);
  };
  const reg = async () => {
    if(!rName.trim()){setRE("נא להכניס שם מלא");return;}
    if(rPhone.replace(/-/g,"").length<9){setRE("נא להכניס מספר נייד תקין");return;}
    if(!rDept){setRE("נא לבחור מחלקה");return;}
    if(rPass.length<4){setRE("הסיסמה חייבת להכיל לפחות 4 תווים");return;}
    if(rPass!==rPass2){setRE("הסיסמאות אינן תואמות");return;}
    setBusy(true);
    try{
      const c = rPhone.replace(/-/g,"");
      const cred = await auth.createUserWithEmailAndPassword(phoneToEmail(c), rPass);
      await db.collection("users").doc(cred.user.uid).set({name:rName.trim(),phone:c,dept:rDept,status:"pending",role:"employee",position:"נאמן בטיחות"});
      await auth.signOut();
      setDone(true);
    }catch(e){
      setRE(e.code==="auth/email-already-in-use"?"מספר זה כבר רשום":"שגיאה ברישום: "+e.message);
    }
    setBusy(false);
  };
  const [mErrMsg, setMErrMsg] = useState("");
  const mgr = async () => {
    setBusy(true); setMErrMsg("");
    let cred;
    try{
      cred = await auth.signInWithEmailAndPassword(MANAGER_EMAIL, mPass);
    }catch(e){
      setME(true);
      setMErrMsg(e.code==="auth/user-not-found"?"חשבון המנהל לא קיים ב-Authentication (בדוק שיצרת אותו עם המייל הנכון)."
        :e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"?"הסיסמה שגויה."
        :`שגיאת התחברות: ${e.code||e.message}`);
      setBusy(false); return;
    }
    try{
      const doc = await db.collection("users").doc(cred.user.uid).get();
      if(!doc.exists){ setME(true); setMErrMsg("ההתחברות הצליחה, אך לא נמצא מסמך תואם ב-Firestore (בדוק שה-Document ID זהה בדיוק ל-UID)."); await auth.signOut(); setBusy(false); return; }
      onLogin({ id:cred.user.uid, ...doc.data() });
    }catch(e){
      setME(true);
      setMErrMsg(e.code==="permission-denied"?"אין הרשאת קריאה מ-Firestore (ודא שפרסמת את חוקי האבטחה - Rules → Publish)."
        :`שגיאת Firestore: ${e.code||e.message}`);
      await auth.signOut();
    }
    setBusy(false);
  };

  const wrap={minHeight:"100vh",background:"linear-gradient(135deg,#1B2A3B 0%,#2C3E50 100%)",display:"flex",alignItems:"center",justifyContent:"center",direction:"rtl",padding:20};
  const card={background:"#ffffff18",borderRadius:18,padding:24,width:"100%",maxWidth:360};
  const Hdr=()=><div style={{textAlign:"center",marginBottom:28}}>
    <div style={{marginBottom:12,position:"relative",display:"inline-block"}}>
      <img src={OMIS_LOGO} alt="OMIS Water" style={{
        width:130,height:130,objectFit:"contain",
        filter:"drop-shadow(0 6px 20px rgba(100,50,150,0.5)) drop-shadow(0 2px 8px rgba(0,0,0,0.3))"
      }}/>
    </div>
    <div style={{color:"#fff",fontSize:26,fontWeight:800,marginBottom:3,letterSpacing:1}}>מערכת בטיחות</div>
    <div style={{color:"#a78bfa",fontSize:13,fontWeight:600,letterSpacing:2,marginBottom:2}}>OMIS WATER LTD.</div>
    <div style={{color:"#FF6B35",fontSize:11,letterSpacing:1}}>{companyName}</div>
  </div>;

  if(screen==="main") return <div style={wrap}><div style={{width:"100%",maxWidth:360}}><Hdr/>
    <div style={card}>
      <div style={{color:"#fff",fontWeight:700,marginBottom:6}}>👷 כניסת עובד</div>
      <div style={{color:"#90A4AE",fontSize:12,marginBottom:14}}>הכנס מספר נייד לכניסה או רישום</div>
      <Inp value={phone} onChange={e=>setPhone(e.target.value)} onKeyDown={e=>e.key==="Enter"&&phone.length>=9&&goLogin()} placeholder="מספר נייד (0501234567)" type="tel" style={{marginBottom:12,background:"#fff"}}/>

function toICS(ev){
  const dt = ev.date.replace(/-/g,"");
  const tm = (ev.time||"09:00").replace(":","")+"00";
  const dtStart = `${dt}T${tm}`;
  const start = new Date(`${ev.date}T${ev.time||"09:00"}:00`);
  const end = new Date(start.getTime()+60*60*1000); // שעה אחת כברירת מחדל
  const fmt = d => d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const ics = [
    "BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
    `UID:${ev.id}@omis-safety`,
    `DTSTART:${fmt(start)}`,`DTEND:${fmt(end)}`,
    `SUMMARY:${ev.title}`,
    `DESCRIPTION:${(ev.description||"").replace(/\n/g," ")}`,
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
  const blob = new Blob([ics], {type:"text/calendar"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${ev.title}.ics`; a.click();
  URL.revokeObjectURL(url);
}

function JournalTab({ events, setEvents, user, isMgr, onLog }) {
  const [showAdd,setShowAdd] = useState(false);
  const [title,setTitle] = useState("");
  const [date,setDate] = useState("");
  const [time,setTime] = useState("09:00");
  const [desc,setDesc] = useState("");
  const [sel,setSel] = useState(null);
  const [view,setView] = useState("list"); // list | calendar
  const [curMonth,setCurMonth] = useState(()=>{const d=new Date();return {y:d.getFullYear(),m:d.getMonth()};});

  const add = () => {
    if(!title.trim()||!date) return;
    const ev = { id:Date.now(), title:title.trim(), date, time, description:desc.trim(), createdBy:user.name, readBy:[] };
    setEvents(p=>[ev,...p]);
    onLog({action:`אירוע חדש ביומן: ${title.trim()} (${date} ${time})`, by:user.name, dept:"מנהל"});
    setTitle("");setDate("");setTime("09:00");setDesc("");setShowAdd(false);
  };
  const markRead = (ev) => {
    if(!(ev.readBy||[]).some(r=>r.userId===user.id)){
      setEvents(p=>p.map(e=>e.id===ev.id?{...e,readBy:[...(e.readBy||[]),{userId:user.id,name:user.name,ts:nowTS()}]}:e));
    }
    setSel(ev);
  };
  const sorted = [...events].sort((a,b)=>new Date(b.date)-new Date(a.date));

  // ─── בניית לוח החודש הנוכחי ───
  const today = new Date();
  const isToday = (y,m,d) => today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
  const firstDow = new Date(curMonth.y,curMonth.m,1).getDay();
  const daysInMonth = new Date(curMonth.y,curMonth.m+1,0).getDate();
  const eventsByDay = {};
  events.forEach(ev=>{
    const d = new Date(ev.date);
    if(d.getFullYear()===curMonth.y && d.getMonth()===curMonth.m){
      const day = d.getDate();
      (eventsByDay[day]=eventsByDay[day]||[]).push(ev);
    }
  });
  const monthNames = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  const cells = []; for(let i=0;i<firstDow;i++) cells.push(null); for(let d=1;d<=daysInMonth;d++) cells.push(d);

  return <>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div style={{fontWeight:800,fontSize:18,color:"#1B2A3B"}}>📅 יומן מפגשי בטיחות</div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setView(v=>v==="list"?"calendar":"list")} style={{background:"#EEF2F7",color:"#546E7A",border:"none",borderRadius:10,padding:"8px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{view==="list"?"🗓️ תצוגת לוח שנה":"📋 תצוגת רשימה"}</button>
        {isMgr&&<button onClick={()=>setShowAdd(true)} style={{background:"#FF6B35",color:"#fff",border:"none",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ אירוע חדש</button>}
      </div>
    </div>

    {view==="calendar"&&<div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={()=>setCurMonth(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1})} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#546E7A"}}>◀</button>
        <div style={{fontWeight:700,color:"#1B2A3B"}}>{monthNames[curMonth.m]} {curMonth.y}</div>
        <button onClick={()=>setCurMonth(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1})} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#546E7A"}}>▶</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,fontSize:11,color:"#90A4AE",textAlign:"center",marginBottom:4}}>
        {["א","ב","ג","ד","ה","ו","ש"].map(d=><div key={d}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {cells.map((d,i)=>{
          const dayEvents = d?eventsByDay[d]||[]:[];
          const todayFlag = d&&isToday(curMonth.y,curMonth.m,d);
          return <div key={i} style={{minHeight:50,borderRadius:8,padding:4,background:todayFlag?"#FFF3E0":"#F8FAFC",border:todayFlag?"2px solid #FF6B35":"1px solid #F0F0F0"}}>
            {d&&<div style={{fontSize:11,fontWeight:todayFlag?800:600,color:todayFlag?"#FF6B35":"#546E7A",marginBottom:2}}>{d}</div>}
            {dayEvents.map(ev=><div key={ev.id} onClick={()=>markRead(ev)} style={{fontSize:9,background:"#FF6B35",color:"#fff",borderRadius:4,padding:"1px 3px",marginBottom:2,cursor:"pointer",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ev.title}</div>)}
          </div>;
        })}
      </div>
    </div>}

    {view==="list"&&<>
      {sorted.length===0&&<div style={{textAlign:"center",color:"#90A4AE",padding:30}}>אין אירועים ביומן עדיין</div>}
      {sorted.map(ev=>{
        const read = (ev.readBy||[]).some(r=>r.userId===user.id);
        return <div key={ev.id} onClick={()=>markRead(ev)} style={{background:"#fff",borderRadius:12,padding:14,marginBottom:10,boxShadow:"0 2px 8px #0001",cursor:"pointer",borderRight:`4px solid ${read?"#4CAF50":"#FF6B35"}`}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div style={{fontWeight:700,color:"#1B2A3B"}}>{ev.title}</div>
            <div style={{fontSize:12,color:"#90A4AE"}}>📅 {ev.date} {ev.time&&`🕐 ${ev.time}`}</div>
          </div>
          {ev.description&&<div style={{fontSize:13,color:"#546E7A",marginTop:6}}>{ev.description}</div>}
          {isMgr&&<div style={{fontSize:11,color:"#90A4AE",marginTop:8}}>נקרא ע"י {(ev.readBy||[]).length} משתמשים{(ev.readBy||[]).length>0&&": "+ev.readBy.map(r=>r.name).join(", ")}</div>}
        </div>;
      })}
    </>}

    {showAdd&&<div style={{position:"fixed",inset:0,background:"#0008",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
      <div style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:400}}>
        <div style={{fontWeight:700,marginBottom:12,color:"#1B2A3B"}}>אירוע בטיחות חדש</div>
        <Inp value={title} onChange={e=>setTitle(e.target.value)} placeholder="כותרת (יום עיון, ועדת בטיחות...)" style={{marginBottom:8}}/>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <Inp type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1}}/>
          <Inp type="time" value={time} onChange={e=>setTime(e.target.value)} style={{flex:1}}/>
        </div>
        <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="פרטים נוספים" style={{width:"100%",minHeight:70,padding:10,borderRadius:10,border:"1px solid #E0E0E0",marginBottom:12,direction:"rtl",fontFamily:"inherit"}}/>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={add}>שמור</Btn>
          <Btn onClick={()=>setShowAdd(false)} outline={true}>ביטול</Btn>
        </div>
      </div>
    </div>}
    {sel&&<div onClick={()=>setSel(null)} style={{position:"fixed",inset:0,background:"#0008",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:400}}>
        <div style={{fontWeight:700,marginBottom:6,color:"#1B2A3B"}}>{sel.title}</div>
        <div style={{fontSize:12,color:"#90A4AE",marginBottom:10}}>📅 {sel.date} {sel.time&&`🕐 ${sel.time}`} | נוצר ע"י {sel.createdBy}</div>
        <div style={{fontSize:14,color:"#546E7A",marginBottom:16}}>{sel.description||"אין פרטים נוספים"}</div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={()=>toICS(sel)} outline={true}>📥 הוסף ליומן האישי</Btn>
          <Btn onClick={()=>setSel(null)}>סגור</Btn>
        </div>
      </div>
    </div>}
  </>;
}

function ReportDetail({ report, onClose, onUpdate, onClose2, isManager, currentUser, depts }) {
  const [nUpd,setNU]   = useState("");
  const [nSt,setNS]    = useState(report.status);
  const [showC,setSC]  = useState(false);
  const [showL,setSL]  = useState(false);
  const [fDept,setFD]  = useState(currentUser?.dept||depts?.[0]||"");
  const [fDate,setFDt] = useState(new Date().toISOString().split("T")[0]);
  const [fNotes,setFN] = useState("");
  const [reassign,setR]= useState(false);
  const [nDept,setND]  = useState(report.assignedDept||depts?.[0]||"");
  const [lbox,setLB]   = useState(null);

  const isMyDept = currentUser?.dept===report.assignedDept;
  const canEdit  = isManager||isMyDept;
  const canClose = canEdit&&report.status!=="closed"&&report.status!=="resolved"&&!report.closure;

  const doClose=()=>{
    if(!fDept){alert("נא לבחור מחלקה");return;}
    onClose2(report.id,{fixer:currentUser.name,dept:fDept,date:fDate,notes:fNotes,reassignedTo:reassign?nDept:null});
    onClose();
  };

  return <div style={{position:"fixed",inset:0,background:"#0008",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
    {lbox&&<div onClick={e=>{e.stopPropagation();setLB(null);}} style={{position:"fixed",inset:0,background:"#000d",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      {lbox.type==="image"?<img src={lbox.src} style={{maxWidth:"95vw",maxHeight:"90vh",borderRadius:8}}/>
        :<video src={lbox.src} controls autoPlay style={{maxWidth:"95vw",maxHeight:"90vh",borderRadius:8}}/>}
    </div>}
    <div onClick={e=>e.stopPropagation()} style={{background:"#F8FAFC",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:600,maxHeight:"88vh",overflowY:"auto",padding:24,direction:"rtl"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:18,color:"#1B2A3B"}}>{report.title}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#90A4AE"}}>✕</button>
      </div>
      {(()=>{const mainImg=report.media?.find(m=>m.type==="image");return mainImg&&<div onClick={()=>setLB(mainImg)} style={{width:"100%",height:200,borderRadius:14,overflow:"hidden",marginBottom:16,cursor:"pointer",boxShadow:"0 2px 10px #0002"}}>
        <img src={mainImg.src} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
      </div>;})()}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        <Badge type="severity" value={report.severity}/><Badge type="status" value={report.status}/>
        <span style={{background:"#EEF2F7",color:"#546E7A",padding:"3px 10px",borderRadius:20,fontSize:12}}>📍 {report.location}</span>
        {report.assignedDept&&<span style={{background:"#E3F2FD",color:"#1565C0",padding:"3px 10px",borderRadius:20,fontSize:12}}>🏢 {report.assignedDept}</span>}
      </div>
      <div style={{background:"#fff",borderRadius:10,padding:14,marginBottom:16}}>
        <div style={{fontSize:13,color:"#546E7A",marginBottom:4}}>תיאור:</div>
        <div style={{color:"#1B2A3B",lineHeight:1.6}}>{report.description}</div>
        <div style={{marginTop:8,fontSize:12,color:"#90A4AE"}}>דווח ע"י: <strong>{report.reporter}</strong> | {report.date}</div>
      </div>
      {report.media?.length>0&&<div style={{marginBottom:16}}>
        <div style={{fontWeight:700,color:"#1B2A3B",marginBottom:10}}>📎 מדיה ({report.media.length})</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {report.media.map((m,i)=><div key={i} onClick={()=>setLB(m)} style={{width:80,height:80,borderRadius:10,overflow:"hidden",cursor:"pointer",background:"#1B2A3B",flexShrink:0}}>

          </div>)}
        </div>
      </div>}
      {report.closure&&<div style={{background:"#E8F5E9",borderRadius:12,padding:14,marginBottom:16,border:"1px solid #C8E6C9"}}>
        <div style={{fontWeight:700,color:"#2E7D32",marginBottom:8}}>✅ תקלה טופלה</div>

function NewReportForm({ onSubmit, onClose, reporter, reporterId, categories, locations, depts, allowVideo=false, maxImages=2 }) {
  const [form,setForm] = useState({title:"",category:categories[0]||"",location:locations[0]||"",severity:"medium",description:"",assignedDept:depts[0]||""});
  const [media,setMedia] = useState([]);
  const imgRef=useRef(null); const vidRef=useRef(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const imgs=media.filter(m=>m.type==="image"); const vids=media.filter(m=>m.type==="video");
  const compressImage = (file, maxMB=1.5, maxDim=1600) => new Promise((resolve,reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = ev => { img.onload = () => {
      let {width,height} = img;
      if(width>maxDim||height>maxDim){
        const ratio = Math.min(maxDim/width, maxDim/height);
        width = Math.round(width*ratio); height = Math.round(height*ratio);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img,0,0,width,height);
      let quality = 0.85;
      const tryCompress = () => {
        const dataUrl = canvas.toDataURL("image/jpeg", quality);
        const sizeMB = (dataUrl.length*0.75)/(1024*1024); // הערכת גודל בבייטים מ-base64
        if(sizeMB<=maxMB || quality<=0.4){ resolve(dataUrl); }
        else { quality -= 0.1; tryCompress(); }
      };
      tryCompress();
    }; img.onerror = reject; img.src = ev.target.result; };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  const [compressing,setCompressing] = useState(false);
  const [submitting,setSubmitting] = useState(false);
  const addImgs=async e=>{
    const fs=Array.from(e.target.files).slice(0,maxImages-imgs.length);
    e.target.value="";
    setCompressing(true);
    for(const f of fs){
      try{
        const compressed = await compressImage(f);
        setMedia(p=>[...p,{type:"image",src:compressed,name:f.name}]);
      }catch(err){ console.error("שגיאת כיווץ תמונה:",err); }
    }
    setCompressing(false);
  };
  const addVid=e=>{const f=e.target.files[0];if(!f)return;const u=URL.createObjectURL(f);const v=document.createElement("video");v.preload="metadata";v.onloadedmetadata=()=>{URL.revokeObjectURL(v.src);if(v.duration>15){alert("הסרטון ארוך מ-15 שניות");return;}setMedia(p=>[...p.filter(m=>m.type!=="video"),{type:"video",src:u,name:f.name}]);};v.src=u;e.target.value="";};
  return <div style={{position:"fixed",inset:0,background:"#0008",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:"#F8FAFC",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:600,maxHeight:"92vh",overflowY:"auto",padding:24,direction:"rtl"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
        <div style={{fontWeight:800,fontSize:18,color:"#1B2A3B"}}>🚨 דיווח מפגע חדש</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{marginBottom:14}}>
        <label style={{display:"block",fontWeight:600,color:"#1B2A3B",marginBottom:6,fontSize:14}}>כותרת המפגע</label>
        <input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="תאר בקצרה את המפגע" style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #E0E0E0",fontSize:14,boxSizing:"border-box",direction:"rtl"}}/>
      </div>
      {[{label:"קטגוריה",key:"category",opts:categories},{label:"מיקום",key:"location",opts:locations},{label:"מחלקה מטפלת",key:"assignedDept",opts:depts}].map(f=><div key={f.key} style={{marginBottom:14}}>
        <label style={{display:"block",fontWeight:600,color:"#1B2A3B",marginBottom:6,fontSize:14}}>{f.label}</label>
        <select value={form[f.key]} onChange={e=>set(f.key,e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #E0E0E0",fontSize:14,direction:"rtl"}}>
          {f.opts.map(o=><option key={o}>{o}</option>)}
        </select>
      </div>)}
      <div style={{marginBottom:14}}>
        <label style={{display:"block",fontWeight:600,color:"#1B2A3B",marginBottom:8,fontSize:14}}>חומרה</label>
        <div style={{display:"flex",gap:8}}>
          {Object.entries(SEVERITY).map(([k,v])=><button key={k} onClick={()=>set("severity",k)} style={{flex:1,padding:"8px 4px",borderRadius:8,fontSize:12,fontWeight:700,border:`2px solid ${form.severity===k?v.color:"#E0E0E0"}`,background:form.severity===k?v.bg:"#fff",color:form.severity===k?v.color:"#90A4AE",cursor:"pointer"}}>{v.label}</button>)}
        </div>
      </div>
      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontWeight:600,color:"#1B2A3B",marginBottom:6,fontSize:14}}>תיאור מפורט</label>
        <textarea value={form.description} onChange={e=>set("description",e.target.value)} placeholder="תאר את המפגע בפירוט..." style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #E0E0E0",fontSize:14,minHeight:90,resize:"vertical",direction:"rtl",boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{display:"block",fontWeight:600,color:"#1B2A3B",marginBottom:10,fontSize:14}}>📎 מדיה מהשטח</label>
        {media.length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          {media.map((m,i)=><div key={i} style={{position:"relative",width:72,height:72,borderRadius:10,overflow:"hidden",background:"#1B2A3B"}}>
            {m.type==="image"?<img src={m.src} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :<div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff"}}><span style={{fontSize:24}}>▶️</span></div>}
            <button onClick={()=>setMedia(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:2,right:2,background:"#000a",color:"#fff",border:"none",borderRadius:"50%",width:18,height:18,fontSize:10,cursor:"pointer"}}>✕</button>
          </div>)}
        </div>}
        <input ref={imgRef} type="file" accept="image/*" multiple onChange={addImgs} style={{display:"none"}}/>
        {allowVideo&&<input ref={vidRef} type="file" accept="video/*" onChange={addVid} style={{display:"none"}}/>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>imgRef.current?.click()} disabled={imgs.length>=maxImages||compressing} style={{flex:1,padding:"10px",borderRadius:10,border:"2px dashed #E0E0E0",background:imgs.length>=maxImages?"#F5F5F5":"#fff",cursor:imgs.length>=maxImages?"not-allowed":"pointer",color:imgs.length>=maxImages?"#BDBDBD":"#546E7A",fontSize:13,fontWeight:600}}>{compressing?"⏳ מכווץ תמונה...":`📷 תמונות (${imgs.length}/${maxImages})`}</button>
          {allowVideo&&<button onClick={()=>vidRef.current?.click()} disabled={vids.length>=1} style={{flex:1,padding:"10px",borderRadius:10,border:"2px dashed #E0E0E0",background:vids.length>=1?"#F5F5F5":"#fff",cursor:vids.length>=1?"not-allowed":"pointer",color:vids.length>=1?"#BDBDBD":"#546E7A",fontSize:13,fontWeight:600}}>🎥 סרטון {vids.length>0?"(1/1)":"(עד 15 שנ')"}</button>}
        </div>
      </div>
      <button onClick={async ()=>{if(!form.title||!form.description){alert("נא למלא כותרת ותיאור");return;}setSubmitting(true);await onSubmit({...form,reporter,reporterId,date:new Date().toISOString().split("T")[0],status:"open",media,closure:null,updates:[]});}} disabled={submitting} style={{width:"100%",padding:"14px",background:submitting?"#ccc":"#FF6B35",color:"#fff",border:"none",borderRadius:12,fontWeight:800,fontSize:16,cursor:submitting?"not-allowed":"pointer"}}>{submitting?"⏳ שולח ומעלה תמונות...":"🚨 שלח דיווח"}</button>
    </div>
  </div>;
}

function SafetyInfoTab({ safetyInfo, setSafetyInfo, isManager }) {
  const [openArea, setOpenArea]   = useState(null);
  const [editMode, setEditMode]   = useState(false);
  const [editArea, setEditArea]   = useState(null);   // area being edited
  const [editInstr, setEditInstr] = useState(null);   // instruction being edited
  const [search, setSearch]       = useState("");
  const [showAddArea, setShowAddArea] = useState(false);
  const [newArea, setNewArea]     = useState({ name:"", icon:"🔒", color:"#FF6B35" });

  const ICONS = ["⚡","💧","🔌","🏭","🔧","🚨","🧪","🔥","⚠️","🛡️","🔩","🏥"];
  const COLORS = ["#F44336","#2196F3","#9C27B0","#FF9800","#4CAF50","#B71C1C","#00BCD4","#795548","#607D8B","#E91E63"];

  const filtered = safetyInfo.filter(a =>
    !search || a.name.includes(search) ||
    a.instructions.some(i => i.title.includes(search) || i.content.includes(search))
  );

  const updateArea = (areaId, changes) =>
    setSafetyInfo(p => p.map(a => a.id===areaId ? {...a,...changes} : a));

  const updateInstr = (areaId, instrId, changes) =>
    setSafetyInfo(p => p.map(a => a.id!==areaId ? a : {
      ...a, instructions: a.instructions.map(i => i.id!==instrId ? i : {...i,...changes})
    }));

  const deleteInstr = (areaId, instrId) =>
    setSafetyInfo(p => p.map(a => a.id!==areaId ? a : {
      ...a, instructions: a.instructions.filter(i => i.id!==instrId)
    }));

  const addInstr = (areaId) =>
    setSafetyInfo(p => p.map(a => a.id!==areaId ? a : {
      ...a, instructions: [...a.instructions, { id: Date.now(), title:"הנחיה חדשה", content:"תוכן ההנחיה..." }]
    }));

  const deleteArea = (areaId) => {
    if (!window.confirm("למחוק את האזור הזה?")) return;
    setSafetyInfo(p => p.filter(a => a.id!==areaId));
  };

  const addArea = () => {
    if (!newArea.name.trim()) return;
    setSafetyInfo(p => [...p, { ...newArea, id: Date.now(), instructions: [] }]);
    setNewArea({ name:"", icon:"🔒", color:"#FF6B35" });
    setShowAddArea(false);
  };

  return <>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div>
        <div style={{fontWeight:800,color:"#1B2A3B",fontSize:17}}>🛡️ בטיחות OMIS</div>
        <div style={{fontSize:12,color:"#90A4AE"}}>הנחיות בטיחות לפי אזורים</div>
      </div>
      {isManager && (
        <button onClick={()=>setEditMode(e=>!e)} style={{
          background: editMode?"#FF6B35":"#EEF2F7", color: editMode?"#fff":"#546E7A",
          border:"none", borderRadius:10, padding:"8px 14px", fontWeight:700, fontSize:13, cursor:"pointer"
        }}>{editMode?"✅ סיום עריכה":"✏️ עריכה"}</button>
      )}
    </div>

    {/* Search */}
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש הנחיה..."
      style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #E0E0E0",
        fontSize:13,direction:"rtl",background:"#fff",marginBottom:12,boxSizing:"border-box"}}/>

    {/* Emergency banner */}
    <div style={{background:"linear-gradient(135deg,#B71C1C,#D32F2F)",borderRadius:12,padding:14,
      marginBottom:14,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}
      onClick={()=>setOpenArea(openArea==='emergency'?null:'emergency')}>
      <span style={{fontSize:28}}>🚨</span>
      <div>
        <div style={{color:"#fff",fontWeight:800,fontSize:15}}>חירום - 101 | 102 | 100</div>
        <div style={{color:"#ffcdd2",fontSize:12}}>לחץ לפרטים נוספים על מספרי חירום ונקודות כינוס</div>
      </div>
    </div>

    {/* Areas */}
    {filtered.map(area => (
      <div key={area.id} style={{background:"#fff",borderRadius:14,marginBottom:10,overflow:"hidden",boxShadow:"0 2px 8px #0001"}}>

        {/* Area header */}
        <div onClick={()=>setOpenArea(openArea===area.id?null:area.id)}
          style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",cursor:"pointer",
            borderRight:`5px solid ${area.color}`,
            background: openArea===area.id ? area.color+"15" : "#fff"}}>
          <span style={{fontSize:26}}>{area.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:"#1B2A3B",fontSize:15}}>{area.name}</div>
            <div style={{fontSize:12,color:"#90A4AE"}}>{area.instructions.length} הנחיות</div>
          </div>
          {editMode && isManager && (
            <div style={{display:"flex",gap:6}} onClick={e=>e.stopPropagation()}>
              <button onClick={()=>setEditArea(area)} style={{background:"#EEF2F7",border:"none",
                borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:12}}>✏️</button>
              <button onClick={()=>deleteArea(area.id)} style={{background:"#FFEBEE",color:"#F44336",
                border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:12}}>🗑️</button>
            </div>
          )}
          <span style={{color:area.color,fontSize:18,fontWeight:700}}>
            {openArea===area.id?"▲":"▼"}
          </span>
        </div>

        {/* Instructions */}
        {openArea===area.id && (
          <div style={{padding:"0 16px 16px"}}>
            {area.instructions.map((instr,i) => (
              <div key={instr.id} style={{marginTop:12,background:"#F8FAFC",borderRadius:10,
                padding:14,borderRight:`3px solid ${area.color}`}}>
                {editMode && isManager && editInstr===instr.id ? (
                  /* Edit mode for instruction */
                  <div>
                    <input value={instr.title}
                      onChange={e=>updateInstr(area.id,instr.id,{title:e.target.value})}
                      style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${area.color}`,
                        fontSize:14,fontWeight:700,direction:"rtl",marginBottom:8,boxSizing:"border-box"}}/>
                    <textarea value={instr.content}
                      onChange={e=>updateInstr(area.id,instr.id,{content:e.target.value})}
                      style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #E0E0E0",
                        fontSize:13,direction:"rtl",minHeight:80,resize:"vertical",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",gap:8,marginTop:8}}>
                      <button onClick={()=>setEditInstr(null)} style={{flex:1,padding:"8px",background:"#4CAF50",

function LogTab({ reports, gLog }) {
  const [srch,setSrch]     = useState("");
  const [byDept,setByDept] = useState("הכל");
  const [byUser,setByUser] = useState("הכל");
  const [byType,setByType] = useState("הכל");

  // איסוף כל רשומות מכל התקלות + לוג גלובלי
  const repEntries = reports.flatMap(r=>(r.log||[]).map(l=>({...l,reportTitle:r.title,source:"תקלה"})));
  const allEntries = [...gLog.map(l=>({...l,reportTitle:"-",source:"מנהל"})), ...repEntries]
    .sort((a,b)=>b.ts>a.ts?1:-1);

  const allDepts = ["הכל",...new Set(allEntries.map(e=>e.dept).filter(Boolean))];
  const allUsers = ["הכל",...new Set(allEntries.map(e=>e.by).filter(Boolean))];
  const allTypes = ["הכל","תקלה","מנהל"];

  const filtered = allEntries.filter(e=>{
    const ms=!srch||e.action.includes(srch)||e.reportTitle.includes(srch)||e.by.includes(srch);
    const md=byDept==="הכל"||e.dept===byDept;
    const mu=byUser==="הכל"||e.by===byUser;
    const mt=byType==="הכל"||e.source===byType;
    return ms&&md&&mu&&mt;
  });

  const rowColor=(src)=>src==="מנהל"?"#E3F2FD":"#F8FAFC";
  const actionColor=(a)=>{
    if(a.includes("נפתחה"))return "#1565C0";
    if(a.includes("טופלה")||a.includes("סגורה"))return "#2E7D32";
    if(a.includes("הועבר"))return "#E65100";
    if(a.includes("שונה"))return "#6A1B9A";
    if(a.includes("אישור"))return "#00695C";
    if(a.includes("דחיית"))return "#B71C1C";
    return "#FF6B35";
  };

  return <>
    <div style={{fontWeight:800,color:"#1B2A3B",marginBottom:12,fontSize:16}}>📜 לוג פעילות מלא</div>

    {/* Search + filters */}
    <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="🔍 חיפוש..."
      style={{width:"100%",padding:"9px 14px",borderRadius:10,border:"1px solid #E0E0E0",fontSize:13,direction:"rtl",background:"#fff",marginBottom:8,boxSizing:"border-box"}}/>
    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
      {[["byDept",byDept,setByDept,allDepts],["byUser",byUser,setByUser,allUsers],["byType",byType,setByType,allTypes]].map(([k,v,sv,opts])=>
        <select key={k} value={v} onChange={e=>sv(e.target.value)} style={{flex:1,minWidth:90,padding:"7px 8px",borderRadius:8,border:"1px solid #E0E0E0",fontSize:12,direction:"rtl",background:"#fff"}}>
          {opts.map(o=><option key={o}>{o}</option>)}
        </select>
      )}
    </div>

    {/* Summary */}
    <div style={{background:"#1B2A3B",borderRadius:10,padding:"8px 14px",marginBottom:12,display:"flex",gap:16,fontSize:12,color:"#90A4AE"}}>
      <span>סה"כ: <strong style={{color:"#fff"}}>{allEntries.length}</strong></span>
      <span>מוצג: <strong style={{color:"#FF6B35"}}>{filtered.length}</strong></span>
      <span style={{marginRight:"auto",fontSize:11,color:"#546E7A"}}>🔵 תקלה &nbsp;🟢 מנהל</span>
    </div>

    {/* Table */}
    {filtered.length===0
      ?<div style={{textAlign:"center",color:"#90A4AE",padding:40}}><div style={{fontSize:36,marginBottom:8}}>📭</div>אין רשומות</div>
      :<div style={{overflowX:"auto",borderRadius:12,boxShadow:"0 2px 8px #0001"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,background:"#fff",minWidth:480}}>
          <thead>
            <tr style={{background:"#1B2A3B",color:"#fff"}}>
              {["תאריך ושעה","שם","מחלקה","פעולה","תקלה"].map(h=><th key={h} style={{padding:"10px 10px",textAlign:"right",fontWeight:700,fontSize:12,whiteSpace:"nowrap"}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {filtered.map((e,i)=><tr key={i} style={{background:i%2===0?rowColor(e.source):"#fff",borderBottom:"1px solid #F0F0F0"}}>
              <td style={{padding:"9px 10px",whiteSpace:"nowrap",color:"#546E7A",fontSize:11}}>{e.ts}</td>
              <td style={{padding:"9px 10px",fontWeight:600,color:"#1B2A3B"}}>{e.by}</td>
              <td style={{padding:"9px 10px",color:"#546E7A"}}>{e.dept||"-"}</td>
              <td style={{padding:"9px 10px"}}>
                <span style={{color:actionColor(e.action),fontWeight:600}}>{e.action}</span>
              </td>
              <td style={{padding:"9px 10px",color:"#90A4AE",fontSize:11}}>{e.reportTitle!=="-"?e.reportTitle:<span style={{color:"#90A4AE"}}>-</span>}</td>
            </tr>)}
          </tbody>
        </table>
      </div>
    }
    <div style={{textAlign:"center",padding:"12px 0",fontSize:11,color:"#B0BEC5"}}>© אומיס מים | אשר בלומנפלד | v{VERSION}</div>
  </>;
}

function SafetyApp() {
  const [user,setUser]     = useState(null);
  const [authReady,setAuthReady] = useState(false); // האם סיימנו לבדוק אם יש session שמור
  const [users,setUsers]   = useState([]);
  const [reports,setRep]   = useState([]);
  const [notif,setNotif]   = useState([
    {id:1,text:"מפגע חדש: מגן מכונה חסר - דחיפות גבוהה!",date:"2026-06-30",read:false},
    {id:2,text:"עדכון: טכנאי שוגר לטיפול בדלת פתוחה",date:"2026-06-29",read:false},
  ]);
  const [tab,setTab]       = useState("reports");
  const [filter,setFilter] = useState("all");
  const [search,setSrch]   = useState("");
  const [sel,setSel]       = useState(null);
  const [showNew,setShowN] = useState(false);
  const [cats,setCats]       = useState(DEF_CATS);
  const [locs,setLocs]       = useState(DEF_LOCS);
  const [depts,setDepts]     = useState(DEF_DEPTS);
  const [safetyInfo,setSafetyInfo] = useState(DEF_SAFETY_INFO);
  const [co,setCo]         = useState("HADERA DESALINATION PLANT");
  const [logo,setLogo]     = useState(null);
  const [popDis,setPopDis] = useState(false);
  const [gLog,setGLog]     = useState([
    {action:"מערכת הופעלה",by:"מערכת",dept:"",ts:nowTS(),reportTitle:"-",source:"מנהל"},
  ]);
  const [sheetsUrl,setSheetsUrl] = useState("");
  const [driveConfig,setDriveConfig] = useState({folderId:"",scriptUrl:""});
  const [pendingSync,setPendingSync] = useState([]); // תור המתנה לסנכרון
  const [syncStatus,setSyncStatus]   = useState("idle"); // idle | syncing | ok | error
  const [lastSync,setLastSync]       = useState(null);   // timestamp סנכרון אחרון
  const [syncInterval,setSyncIntervalMin] = useState(5); // דקות בין ניסיונות
  const [syncErrors,setSyncErrors]   = useState(0);      // מספר כשלונות רצופים
  const [allowVideo,setAllowVideo]   = useState(false);  // האם מותר לצרף סרטון לדיווח
  const [maxImages,setMaxImages]     = useState(2);      // מקסימום תמונות לדיווח
  const [events,setEvents]           = useState([]);     // יומן אירועי בטיחות
  const [annualCall,setAnnualCall]   = useState({number:"",year:new Date().getFullYear(),setBy:"",date:""});
  const [imgScriptUrl,setImgScriptUrl] = useState(""); // כתובת Apps Script להעלאת תמונות ל-Drive
  const [showEventPopup,setShowEventPopup] = useState(false);
  const isMgr  = user?.role==="manager";
  // ─── בדיקת אירועי יומן שלא נקראו - הצגת פופאפ בכניסה ────
  useEffect(() => {
    if(!user) { setShowEventPopup(false); return; }
    const unread = events.some(ev => !(ev.readBy||[]).some(r=>r.userId===user.id));
    setShowEventPopup(unread);
  }, [user, events]);

  // ─── סנכרון הגדרות עם Firestore - שמירה קבועה, לא רק בזיכרון הדפדפן ────
  const skipNextSettingsWrite = useRef(false);
  useEffect(() => {
    if(!user) return;
    const unsub = db.collection("settings").doc("main").onSnapshot(doc => {
      if(doc.exists){
        const d = doc.data();
        skipNextSettingsWrite.current = true;
        if(d.cats) setCats(d.cats);
        if(d.locs) setLocs(d.locs);
        if(d.depts) setDepts(d.depts);
        if(d.safetyInfo) setSafetyInfo(d.safetyInfo);
        if(d.co) setCo(d.co);
        if(typeof d.allowVideo==="boolean") setAllowVideo(d.allowVideo);
        if(d.maxImages) setMaxImages(d.maxImages);
        if(d.annualCall) setAnnualCall(d.annualCall);
        if(d.driveConfig) setDriveConfig(d.driveConfig);
        if(typeof d.imgScriptUrl==="string") setImgScriptUrl(d.imgScriptUrl);
      }
    }, err => console.error("שגיאת סנכרון הגדרות:", err));
    return () => unsub();
  }, [user]);

  useEffect(() => {
    if(!isMgr) return;
    if(skipNextSettingsWrite.current){ skipNextSettingsWrite.current = false; return; }
    const t = setTimeout(() => {
      db.collection("settings").doc("main").set({
        cats, locs, depts, safetyInfo, co, allowVideo, maxImages, annualCall, driveConfig, imgScriptUrl
      }, { merge:true }).catch(e => console.error("שגיאת שמירת הגדרות:", e));
    }, 800); // דיליי קטן כדי לא לכתוב על כל הקשה
    return () => clearTimeout(t);
  }, [cats, locs, depts, safetyInfo, co, allowVideo, maxImages, annualCall, driveConfig, imgScriptUrl, isMgr]);

  const syncRef = useRef(null); // מזהה ה-interval

  // ─── שחזור session אוטומטי - "זכור אותי" בזכות Firebase Auth ────
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (fbUser) => {
      if(!fbUser){ setAuthReady(true); return; }
      try{
        const doc = await db.collection("users").doc(fbUser.uid).get();
        const data = doc.data();
        if(data && data.status==="approved") setUser({ id:fbUser.uid, ...data });
        else if(!data) setUser(null); // ייתכן חשבון מנהל בלי דוח - לא אמור לקרות
      }catch(e){ console.error("שגיאה בשחזור session:", e); }
      setAuthReady(true);
    });
    return () => unsub();
  }, []);

  // ─── סנכרון חי של דיווחים - Firestore - לכל משתמש מחובר ────
  useEffect(() => {
    if(!user) return;
    const unsub = db.collection("reports").orderBy("createdAt","desc").onSnapshot(snap => {
      setRep(snap.docs.map(d => ({ id:d.id, ...d.data() })));
    }, err => console.error("שגיאת סנכרון דיווחים:", err));
    return () => unsub();
  }, [user]);

  // ─── סנכרון חי של רשימת המשתמשים - למנהל בלבד (הרשאות Firestore) ────
  useEffect(() => {
    if(!user || user.role!=="manager") return;
    const unsub = db.collection("users").onSnapshot(snap => {
      setUsers(snap.docs.map(d => ({ id:d.id, ...d.data() })));
    }, err => console.error("שגיאת סנכרון משתמשים:", err));
    return () => unsub();
  }, [user]);

  const unread = notif.filter(n=>!n.read).length;
  const pend   = users.filter(u=>u.status==="pending").length;
  const myReps = user&&!isMgr ? reports.filter(r=>r.assignedDept===user.dept&&(r.status==="open"||r.status==="in_progress")) : [];
  const showPop= myReps.length>0&&!popDis;
  const filtered=reports.filter(r=>{
    const mf=filter==="all"||r.status===filter||r.severity===filter;
    const ms=!search||r.title.includes(search)||r.location.includes(search)||r.category.includes(search);
    return mf&&ms;
  });

  // ─── מנוע סנכרון ─────────────────────────────────────────
  const addToPending = useCallback((type, data) => {
    setPendingSync(p => [...p, { id: Date.now(), type, data, ts: nowTS(), retries: 0 }]);
  }, []);

  const attemptSync = useCallback(async (config, pending) => {
    if (!config.scriptUrl || pending.length === 0) return;
    setSyncStatus("syncing");
    try {
      const res = await fetch(config.scriptUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ folderId: config.folderId, items: pending }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      // הצלחה - מחק פריטים שסונכרנו
      setPendingSync([]);
      setSyncStatus("ok");
      setSyncErrors(0);
      setLastSync(nowTS());
      setGLog(p => [{ action: `סנכרון הצליח - ${pending.length} פריטים הועלו`, by: "מערכת", dept: "", ts: nowTS(), source: "מנהל" }, ...p]);
    } catch (e) {
      setSyncStatus("error");
      setSyncErrors(n => n + 1);
      // עדכן מספר ניסיונות לכל פריט
      setPendingSync(p => p.map(item => ({ ...item, retries: item.retries + 1 })));
    }
  }, []);

  // refs לגישה לערכים עדכניים בתוך interval
  const driveConfigRef = useRef(driveConfig);
  const pendingSyncRef = useRef(pendingSync);
  useEffect(() => { driveConfigRef.current = driveConfig; }, [driveConfig]);
  useEffect(() => { pendingSyncRef.current = pendingSync; }, [pendingSync]);

  // הפעל interval לסנכרון אוטומטי
  useEffect(() => {
    if (syncRef.current) clearInterval(syncRef.current);
    syncRef.current = setInterval(() => {
      const cfg = driveConfigRef.current;
      const pending = pendingSyncRef.current;
      if (cfg.scriptUrl && pending.length > 0) {
        attemptSync(cfg, pending);
      }
    }, syncInterval * 60 * 1000);
    return () => clearInterval(syncRef.current);
  }, [syncInterval, attemptSync]);

  // ניסיון מיידי כשנוסף פריט חדש לתור
  useEffect(() => {
    if (driveConfig.scriptUrl && pendingSync.length > 0 && syncStatus !== "syncing") {
      attemptSync(driveConfig, pendingSync);
    }
  }, [pendingSync.length]);

  const addLog=(action,dept)=>setGLog(p=>[{action,by:user?.name||"מערכת",dept:dept||user?.dept||"מנהל",ts:nowTS(),reportTitle:"-",source:"מנהל"},...p]);

  const uploadImageToDrive = async (base64, fileName) => {
    if(!imgScriptUrl) return null;
    try{
      const res = await fetch(imgScriptUrl, {
        method:"POST",
        headers:{ "Content-Type":"text/plain;charset=utf-8" }, // נמנע מ-CORS preflight מול Apps Script
        body: JSON.stringify({ image: base64, fileName })
      });
      const data = await res.json();
      return data.success ? data.url : null;
    }catch(e){ console.error("שגיאת העלאת תמונה לדרייב:", e); return null; }
  };

  const handleUpdate=(id,nSt,text)=>{
    const ts=nowTS();
    const rep=reports.find(r=>r.id===id);
    if(!rep) return;
    const le=[];
    if(nSt!==rep.status)le.push(`סטטוס שונה מ"${STATUS[rep.status]?.label}" ל"${STATUS[nSt]?.label}"`);
    if(text)le.push(`עדכון: ${text.slice(0,50)}`);
    db.collection("reports").doc(id).update({
      status:nSt,
      updates: text?[...(rep.updates||[]),{text,by:user.name,ts}]:(rep.updates||[]),
      log:[...(rep.log||[]),...le.map(a=>({action:a,by:user.name,dept:user.dept||"מנהל",ts}))]
    }).catch(e=>alert("שגיאת עדכון: "+e.message));
    if(nSt!==rep.status) addLog(`שינוי סטטוס תקלה "${rep.title}" ל"${STATUS[nSt]?.label}"`);
    if(text) addLog(`עדכון הוסף לתקלה: "${rep.title}"`);
    if(text)setNotif(p=>[{id:Date.now(),text:`עדכון מנהל על: ${rep.title}`,date:new Date().toISOString().split("T")[0],read:false},...p]);
  };

  const handleClose=(id,c)=>{
    const rep=reports.find(r=>r.id===id);
    if(!rep) return;
    const nAD=c.reassignedTo||rep.assignedDept;
    const la=[`תקלה סגורה ע"י ${c.fixer} (${c.dept})`,...(c.notes?[`הערות: ${c.notes.slice(0,50)}`]:[]),...(c.reassignedTo?[`הועבר ל: ${c.reassignedTo}`]:[])];
    db.collection("reports").doc(id).update({
      status:c.reassignedTo?"open":"resolved",
      assignedDept:nAD,
      closure:c.reassignedTo?null:c,
      updates:[...(rep.updates||[]),{text:c.reassignedTo?`הועבר ל${c.reassignedTo} ע"י ${c.fixer}${c.notes?` | ${c.notes}`:""}`:`טופל ע"י ${c.fixer} (${c.dept})${c.notes?` | ${c.notes}`:""}`,by:c.fixer,ts:nowTS()}],
      log:[...(rep.log||[]),...la.map(a=>({action:a,by:c.fixer,dept:c.dept,ts:nowTS()}))]
    }).catch(e=>alert("שגיאת עדכון: "+e.message));
    setNotif(p=>[{id:Date.now(),text:c.reassignedTo?`↩️ תקלה הועברה ל${c.reassignedTo}: ${rep.title}`:`✅ תקלה טופלה: ${rep.title}`,date:new Date().toISOString().split("T")[0],read:false},...p]);
    setGLog(p=>[{action:c.reassignedTo?`תקלה הועברה ל${c.reassignedTo}: "${rep.title}"`:`תקלה נסגרה: "${rep.title}" ע"י ${c.fixer}`,by:c.fixer,dept:c.dept,ts:nowTS(),reportTitle:rep.title,source:"תקלה"},...p]);
  };

  const handleNew=async (r)=>{
    setShowN(false);
    let media = r.media||[];
    let driveNote = null;
    if(imgScriptUrl){
      const uploaded = [];
      for(const m of media){
        if(m.type==="image"){
          const url = await uploadImageToDrive(m.src, m.name||`report_${Date.now()}.jpg`);
          uploaded.push(url?{type:"image",src:url,name:m.name}:{type:"image",src:"",name:m.name,failed:true});
        } else {
          uploaded.push({type:m.type,src:"",name:m.name,note:"וידאו לא נשמר - נדרש חיבור אחסון וידאו"});
        }
      }
      media = uploaded;
    } else if(media.length>0){
      driveNote = "תמונות לא נשמרו - סקריפט העלאה לדרייב לא מוגדר עדיין";
      media = media.map(m=>({type:m.type,src:"",name:m.name,note:driveNote}));
    }
    const newRep = {
      ...r, media,
      log:[{action:"תקלה נפתחה",by:user.name,dept:user.dept||"",ts:nowTS()}],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    try{
      await db.collection("reports").add(newRep);
    }catch(e){ alert("שגיאה בשמירת הדיווח: "+e.message); return; }
    setNotif(p=>[{id:Date.now(),text:`מפגע חדש: ${r.title} - ${SEVERITY[r.severity].label}!`,date:r.date,read:false},...p]);
    setGLog(p=>[{action:`תקלה חדשה נפתחה: "${r.title}" (${r.assignedDept})`,by:user.name,dept:user.dept||"",ts:nowTS(),reportTitle:r.title,source:"תקלה"},...p]);
    if(driveNote) alert(driveNote+" - הדיווח עצמו נשמר בהצלחה, רק התמונות לא צורפו.");
  };

  if(!authReady) return <div style={{minHeight:"100vh",background:"#1B2A3B",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14}}>טוען...</div>;
  if(!user) return <LoginScreen onLogin={u=>{setUser(u);setPopDis(false);}} logo={logo} companyName={co} depts={depts}/>;

  return <div style={{minHeight:"100vh",background:"#F0F4F8",direction:"rtl",fontFamily:"system-ui,sans-serif"}}>
    <div style={{background:"linear-gradient(135deg,#1B2A3B 0%,#2C3E50 100%)",padding:"14px 20px",color:"#fff"}}>
      <div style={{maxWidth:600,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={OMIS_LOGO} alt="OMIS" style={{width:44,height:44,objectFit:"contain",filter:"drop-shadow(0 2px 8px rgba(0,0,0,0.5))"}}/> 
          <div><div style={{fontSize:15,fontWeight:800,letterSpacing:0.5}}>OMIS • בטיחות</div><div style={{fontSize:11,color:"#90A4AE"}}>{isMgr?"🔑 מנהל":"👷"} {user.name}</div></div>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setTab("notifications")}>
            <span style={{fontSize:22}}>🔔</span>
            {unread>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#FF6B35",color:"#fff",borderRadius:10,fontSize:10,fontWeight:700,padding:"2px 5px",minWidth:16,textAlign:"center"}}>{unread}</span>}
          </div>
          {/* Sync indicator */}
          {driveConfig.scriptUrl && (
            <div title={syncStatus==="ok"?`סונכרן: ${lastSync}`:syncStatus==="error"?`שגיאה (${syncErrors} ניסיונות) - ${pendingSync.length} ממתינים`:syncStatus==="syncing"?"מסנכרן...":pendingSync.length>0?`${pendingSync.length} ממתינים לסנכרון`:"מסונכרן"}
              style={{display:"flex",alignItems:"center",gap:4,cursor:"default"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:
                syncStatus==="ok"?"#4CAF50":
                syncStatus==="syncing"?"#FF9800":
                syncStatus==="error"?"#F44336":
                pendingSync.length>0?"#FF9800":"#4CAF50",
                animation:syncStatus==="syncing"?"pulse 1s infinite":"none"
              }}/>
              {pendingSync.length>0&&<span style={{fontSize:10,color:"#FF9800",fontWeight:700}}>{pendingSync.length}</span>}
            </div>
          )}
          <button onClick={()=>{auth.signOut();setUser(null);}} style={{background:"none",border:"none",color:"#90A4AE",cursor:"pointer",fontSize:12}}>יציאה</button>
        </div>
      </div>
    </div>

    <div style={{maxWidth:600,margin:"0 auto",padding:"16px 16px 90px"}}>
      {tab==="reports"&&<>
        {isMgr&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
          {Object.entries(STATUS).map(([k,v])=><div key={k} style={{background:v.bg,borderRadius:10,padding:"10px 8px",textAlign:"center",border:`1px solid ${v.color}30`}}>
            <div style={{fontSize:22,fontWeight:800,color:v.color}}>{reports.filter(r=>r.status===k).length}</div>
            <div style={{fontSize:11,color:v.color,fontWeight:600}}>{v.label}</div>
          </div>)}
        </div>}
        <input value={search} onChange={e=>setSrch(e.target.value)} placeholder="🔍 חיפוש..." style={{width:"100%",padding:"10px 16px",borderRadius:10,border:"1px solid #E0E0E0",fontSize:14,boxSizing:"border-box",direction:"rtl",background:"#fff",marginBottom:12}}/>
        <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
          {[{k:"all",l:"הכל"},{k:"open",l:"פתוח"},{k:"in_progress",l:"בטיפול"},{k:"resolved",l:"טופל"},{k:"high",l:"⚠️ גבוה"}].map(f=><button key={f.k} onClick={()=>setFilter(f.k)} style={{padding:"6px 14px",borderRadius:20,border:"none",fontSize:12,fontWeight:600,whiteSpace:"nowrap",cursor:"pointer",background:filter===f.k?"#1B2A3B":"#fff",color:filter===f.k?"#fff":"#546E7A",boxShadow:"0 1px 4px #0001"}}>{f.l}</button>)}
        </div>
        {filtered.length===0?<div style={{textAlign:"center",color:"#90A4AE",padding:40}}><div style={{fontSize:40,marginBottom:8}}>✅</div>לא נמצאו דיווחים</div>
          :filtered.map(r=><ReportCard key={r.id} report={r} onSelect={setSel}/>)}
        {(isMgr||user?.position==="ר\"צ")&&annualCall.number&&<div style={{marginTop:20,background:"#fff",borderRadius:12,padding:14,borderRight:"4px solid #FF6B35",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700,color:"#1B2A3B",fontSize:13}}>💰 קריאת שירות שנתית {annualCall.year}</div>
            <div style={{fontSize:12,color:"#90A4AE"}}>מספר: {annualCall.number}</div>
          </div>
        </div>}
      </>}

      {tab==="notifications"&&<>
        <div style={{fontWeight:700,color:"#1B2A3B",marginBottom:14,fontSize:16}}>🔔 התראות</div>
        <button onClick={()=>setNotif(n=>n.map(x=>({...x,read:true})))} style={{background:"none",border:"none",color:"#FF6B35",fontWeight:600,fontSize:13,cursor:"pointer",marginBottom:12}}>✓ סמן הכל כנקרא</button>
        {notif.map(n=><div key={n.id} onClick={()=>setNotif(p=>p.map(x=>x.id===n.id?{...x,read:true}:x))} style={{background:n.read?"#fff":"#FFF3E0",borderRadius:10,padding:14,marginBottom:10,borderRight:`4px solid ${n.read?"#E0E0E0":"#FF6B35"}`,cursor:"pointer"}}>
          <div style={{fontSize:14,color:"#1B2A3B",marginBottom:4}}>{n.text}</div>
          <div style={{fontSize:11,color:"#90A4AE"}}>{n.date}</div>
        </div>)}
      </>}

      {tab==="history"&&<>
        <div style={{fontWeight:700,color:"#1B2A3B",marginBottom:14,fontSize:16}}>📂 ארכיון</div>
        <div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:12}}>
          <div style={{fontWeight:600,color:"#1B2A3B",marginBottom:12}}>לפי קטגוריה</div>
          {cats.filter(c=>reports.some(r=>r.category===c)).map(cat=>{const cnt=reports.filter(r=>r.category===cat).length;return<div key={cat} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span>{cat}</span><span style={{fontWeight:700}}>{cnt}</span></div>
            <div style={{background:"#EEF2F7",borderRadius:4,height:6}}><div style={{background:"#FF6B35",borderRadius:4,height:6,width:`${(cnt/reports.length)*100}%`}}/></div>
          </div>;})}
        </div>
        {reports.map(r=><ReportCard key={r.id} report={r} onSelect={setSel}/>)}
      </>}

      {tab==="safety"&&<SafetyInfoTab safetyInfo={safetyInfo} setSafetyInfo={setSafetyInfo} isManager={isMgr}/>}
      {tab==="journal"&&<JournalTab events={events} setEvents={setEvents} user={user} isMgr={isMgr} onLog={(e)=>setGLog(p=>[{...e,ts:nowTS(),source:"מנהל"},...p])}/>}
      {tab==="log"&&isMgr&&<LogTab reports={reports} gLog={gLog}/>}
      {tab==="users"&&isMgr&&<UsersTab users={users} onLog={(e)=>setGLog(p=>[{...e,ts:nowTS(),source:"מנהל"},...p])}/>}
      {tab==="settings"&&isMgr&&<SettingsTab categories={cats} setCategories={setCats} locations={locs} setLocations={setLocs} depts={depts} setDepts={setDepts} companyName={co} setCompanyName={setCo} logo={logo} setLogo={setLogo} sheetsUrl={sheetsUrl} setSheetsUrl={setSheetsUrl} driveConfig={driveConfig} setDriveConfig={setDriveConfig} syncInterval={syncInterval} setSyncInterval={setSyncIntervalMin} pendingSync={pendingSync} syncStatus={syncStatus} lastSync={lastSync} syncErrors={syncErrors} onSyncNow={()=>attemptSync(driveConfig,pendingSync)} allowVideo={allowVideo} setAllowVideo={setAllowVideo} maxImages={maxImages} setMaxImages={setMaxImages} annualCall={annualCall} setAnnualCall={setAnnualCall} user={user} imgScriptUrl={imgScriptUrl} setImgScriptUrl={setImgScriptUrl}/>}
    </div>

    <div style={{position:"fixed",bottom:0,right:0,left:0,background:"#fff",borderTop:"1px solid #E0E0E0",display:"flex",justifyContent:"space-around",alignItems:"center",padding:"8px 0",direction:"rtl",zIndex:50}}>
      {[{key:"reports",icon:"📋",label:"דיווחים"},{key:"notifications",icon:"🔔",label:"התראות",badge:unread},{key:"safety",icon:"🛡️",label:"בטיחות"},{key:"journal",icon:"📅",label:"יומן"},{key:"history",icon:"📂",label:"ארכיון"},...(isMgr?[{key:"log",icon:"📜",label:"לוג"},{key:"users",icon:"👥",label:"משתמשים",badge:pend},{key:"settings",icon:"⚙️",label:"הגדרות"}]:[])].map(t=><button key={t.key} onClick={()=>setTab(t.key)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative",color:tab===t.key?"#FF6B35":"#90A4AE",fontWeight:tab===t.key?700:400}}>
        <span style={{fontSize:20}}>{t.icon}</span>
        {t.badge>0&&<span style={{position:"absolute",top:-2,right:-4,background:"#FF6B35",color:"#fff",borderRadius:10,fontSize:9,fontWeight:700,padding:"1px 4px",minWidth:14,textAlign:"center"}}>{t.badge}</span>}
        <span style={{fontSize:10}}>{t.label}</span>
      </button>)}
      <button onClick={()=>setShowN(true)} style={{background:"linear-gradient(160deg,#FF8A5C 0%,#FF6B35 45%,#D84315 100%)",border:"4px solid #fff",borderRadius:"50%",width:88,height:88,fontSize:44,fontWeight:800,cursor:"pointer",boxShadow:"0 2px 0 #B33A0E, 0 8px 0 #8A2C0A, 0 14px 28px #0006, inset 0 3px 6px #FFFFFF80, inset 0 -6px 10px #0003",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",marginTop:-42,flexShrink:0,textShadow:"0 2px 3px #0003"}}>+</button>
    </div>

    {showPop&&<div style={{position:"fixed",inset:0,background:"#0008",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setPopDis(true)}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:360,direction:"rtl",boxShadow:"0 8px 40px #0004"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <span style={{fontSize:32}}>🔔</span>
          <div><div style={{fontWeight:800,fontSize:17,color:"#1B2A3B"}}>תקלות פתוחות</div>
          <div style={{fontSize:12,color:"#FF6B35",fontWeight:600}}>מחלקה: {user.dept}</div></div>
        </div>
        <div style={{marginBottom:16}}>
          {myReps.map(r=><div key={r.id} onClick={()=>{setSel(r);setPopDis(true);}} style={{background:"#F8FAFC",borderRadius:10,padding:12,marginBottom:8,borderRight:`4px solid ${SEVERITY[r.severity]?.color}`,cursor:"pointer"}}>
            <div style={{fontWeight:700,color:"#1B2A3B",fontSize:14,marginBottom:4}}>{r.title}</div>
            <div style={{display:"flex",gap:6}}><Badge type="severity" value={r.severity}/><Badge type="status" value={r.status}/></div>
          </div>)}
        </div>
        <button onClick={()=>setPopDis(true)} style={{width:"100%",padding:"12px",background:"#1B2A3B",color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer"}}>הבנתי - המשך</button>
      </div>
    </div>}

    {showEventPopup&&<div style={{position:"fixed",inset:0,background:"#0008",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowEventPopup(false)}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:360,direction:"rtl",boxShadow:"0 8px 40px #0004"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <span style={{fontSize:32}}>📅</span>
          <div><div style={{fontWeight:800,fontSize:17,color:"#1B2A3B"}}>אירועי בטיחות חדשים</div></div>
        </div>
        <div style={{marginBottom:16}}>
          {events.filter(ev=>!(ev.readBy||[]).some(r=>r.userId===user.id)).map(ev=><div key={ev.id} onClick={()=>{setEvents(p=>p.map(e=>e.id===ev.id?{...e,readBy:[...(e.readBy||[]),{userId:user.id,name:user.name,ts:nowTS()}]}:e));}} style={{background:"#F8FAFC",borderRadius:10,padding:12,marginBottom:8,borderRight:"4px solid #FF6B35",cursor:"pointer"}}>
            <div style={{fontWeight:700,color:"#1B2A3B",fontSize:14,marginBottom:4}}>{ev.title}</div>
            <div style={{fontSize:12,color:"#90A4AE"}}>📅 {ev.date}</div>
          </div>)}
        </div>
        <button onClick={()=>setShowEventPopup(false)} style={{width:"100%",padding:"12px",background:"#1B2A3B",color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer"}}>הבנתי - המשך</button>
      </div>
    </div>}

    {sel&&<ReportDetail report={sel} onClose={()=>setSel(null)} onUpdate={handleUpdate} onClose2={handleClose} isManager={isMgr} currentUser={user} depts={depts}/>}
    {showNew&&<NewReportForm onSubmit={handleNew} onClose={()=>setShowN(false)} reporter={user.name} reporterId={user.id} categories={cats} locations={locs} depts={depts} allowVideo={allowVideo} maxImages={maxImages}/>}

    {/* Sync status banner */}
    {driveConfig.scriptUrl && pendingSync.length>0 && (
      <div style={{position:"fixed",bottom:70,right:0,left:0,zIndex:40,display:"flex",justifyContent:"center",pointerEvents:"none"}}>
        <div style={{background:"#1B2A3B",color:"#fff",borderRadius:20,padding:"8px 16px",fontSize:12,display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 16px #0004",pointerEvents:"all"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:syncStatus==="syncing"?"#FF9800":"#F44336",animation:"pulse 1s infinite"}}/>
          <span>{syncStatus==="syncing"?"מסנכרן עם Drive...":`${pendingSync.length} פריטים ממתינים לסנכרון`}</span>
          {syncStatus!=="syncing"&&<button onClick={()=>attemptSync(driveConfig,pendingSync)} style={{background:"#FF6B35",color:"#fff",border:"none",borderRadius:10,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:700}}>נסה עכשיו</button>}
          {syncErrors>0&&<span style={{color:"#FF6B6B",fontSize:11}}>(כשל {syncErrors}×)</span>}
        </div>
      </div>
    )}
    <div style={{textAlign:"center",padding:"6px 0 70px",fontSize:10,color:"#B0BEC5",direction:"rtl"}}>
      © אומיס מים | נכתב ע"י אשר בלומנפלד | v{VERSION}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SafetyApp));
</script>
</body>
</html>
